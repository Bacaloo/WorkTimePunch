name: CI

on:
  pull_request:
  push:
    branches:
      - agent/**
      - main

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint PHP files
        run: find appinfo lib templates -type f -name '*.php' -print0 | xargs -0 -n1 php -l

  javascript-syntax:
    name: JavaScript syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check topbar JavaScript
        run: node --check js/topbar.js
